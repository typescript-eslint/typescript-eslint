name: 'Prepare: Build'
description: 'Prepares the repo for a job by running the build'
# inputs:  - no inputs
# outputs: - no outputs

runs:
  using: 'composite'
  steps:
    # Warm the Nx project graph so the first `nx` invocation in the job skips
    # rebuilding the graph from scratch. Nx revalidates against current file
    # hashes, so a stale restore is safe (worst case: no speedup). Only on
    # Windows, where cold graph construction spikes; on Linux it is already
    # fast enough that the restore cost cancels the gain.
    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      if: runner.os == 'Windows'
      with:
        path: .nx/workspace-data
        key: ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}
        restore-keys: |
          ${{ runner.os }}-nx-

    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      id: build-cache
      with:
        path: |
          packages/*/dist
          dist
        key: ${{ runner.os }}-build-${{ github.ref }}-${{ github.run_id }}
        # We don't want to share builds across runs even for the same branch
        # because each commit can have different build artifacts and we don't
        # want to accidentally share artifacts and poison the build output
        restore-keys: |
          ${{ runner.os }}-build-${{ github.ref }}-${{ github.run_id }}

    # If the cache was hit, then we still run the types build because we generate source files
    - name: Build AST Spec
      if: steps['build-cache'].outputs.cache-hit == 'true'
      shell: bash
      run: |
        pnpm exec nx run types:build

    - name: Build
      if: steps['build-cache'].outputs.cache-hit != 'true'
      shell: bash
      # Website will be built by the Netlify GitHub App
      run: |
        pnpm exec nx run-many --target=build --parallel --exclude=website --exclude=website-eslint
      env:
        SKIP_AST_SPEC_REBUILD: true
