name: Sync Review Labels

on:
  # WARNING: Using pull_request_target here because we need write permissions to add/remove labels from fork PRs.
  # pull_request_target and pull_request_review both run in the TARGET (base) repo context, not the fork context.
  # This gives us a write-scoped token for fork PRs, but it is also why it can be UNSAFE.
  # DO NOT CHECK OUT THE REPO IN THIS WORKFLOW.
  pull_request_target: # zizmor: ignore[dangerous-triggers] See warning above.
    types:
      - review_requested

  pull_request_review:
    types:
      - submitted

permissions: {}

jobs:
  # Author re-requested review: remove "awaiting response" and "1 approval" labels.
  review_requested:
    name: Review Requested
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - uses: actions-ecosystem/action-remove-labels@2ce5d41b4b6aa8503e285553f75ed56e0a40bae0 # v1.3.0
        with:
          labels: |
            1 approval
            awaiting response

      - if: failure()
        run: |
          echo "Don't worry if the previous step failed."
          echo "See https://github.com/actions-ecosystem/action-remove-labels/issues/221."

  # Reviewer requested changes: add "awaiting response" label and remove "1 approval" label.
  changes_requested:
    name: Changes Requested
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1.1.3
        with:
          labels: awaiting response

      - uses: actions-ecosystem/action-remove-labels@2ce5d41b4b6aa8503e285553f75ed56e0a40bae0 # v1.3.0
        with:
          labels: 1 approval

      - if: failure()
        run: |
          echo "Don't worry if the previous step failed."
          echo "See https://github.com/actions-ecosystem/action-remove-labels/issues/221."

  # Reviewer approved: add "1 approval" label and remove any stale "awaiting response" label.
  approved:
    name: Approved
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1.1.3
        with:
          labels: 1 approval

      - uses: actions-ecosystem/action-remove-labels@2ce5d41b4b6aa8503e285553f75ed56e0a40bae0 # v1.3.0
        with:
          labels: awaiting response

      - if: failure()
        run: |
          echo "Don't worry if the previous step failed."
          echo "See https://github.com/actions-ecosystem/action-remove-labels/issues/221."
