name: Apply Review Labels

on:
  # WARNING: Using `workflow_run` here because we need write access to add/remove labels from fork PRs.
  # DO NOT CHECK OUT THE REPO OR RUN CODE FROM ARTIFACTS IN THIS WORKFLOW
  workflow_run: # zizmor: ignore[dangerous-triggers]
    workflows:
      - On Review Status Change
    types:
      - completed

permissions: {}

jobs:
  apply:
    name: Apply Labels
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    permissions:
      actions: read
      pull-requests: write

    steps:
      - name: Download intent
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: review-intent
          path: .
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read intent
        id: intent
        run: |
          if [ -f review-intent ]; then
            cat review-intent >> "$GITHUB_OUTPUT"
          fi

      # Author re-requested review: remove "awaiting response" and "1 approval" labels.
      - if: steps.intent.outputs.intent == 'review_requested'
        name: Review Requested
        uses: actions-ecosystem/action-remove-labels@2ce5d41b4b6aa8503e285553f75ed56e0a40bae0 # v1.3.0
        with:
          number: ${{ steps.intent.outputs.pr_number }}
          labels: |
            1 approval
            awaiting response

      # Reviewer requested changes: add "awaiting response" label and remove "1 approval" label.
      - if: steps.intent.outputs.intent == 'changes_requested'
        name: Changes Requested - Add "awaiting response"
        uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1.1.3
        with:
          number: ${{ steps.intent.outputs.pr_number }}
          labels: awaiting response

      - if: steps.intent.outputs.intent == 'changes_requested'
        name: Changes Requested - Remove "1 approval"
        uses: actions-ecosystem/action-remove-labels@2ce5d41b4b6aa8503e285553f75ed56e0a40bae0 # v1.3.0
        with:
          number: ${{ steps.intent.outputs.pr_number }}
          labels: 1 approval

      # Reviewer approved: record the approval and drop any stale "awaiting response" label.
      - if: steps.intent.outputs.intent == 'approved'
        name: Approved - Add "1 approval"
        uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1.1.3
        with:
          number: ${{ steps.intent.outputs.pr_number }}
          labels: 1 approval

      - if: steps.intent.outputs.intent == 'approved'
        name: Approved - Remove "awaiting response"
        uses: actions-ecosystem/action-remove-labels@2ce5d41b4b6aa8503e285553f75ed56e0a40bae0 # v1.3.0
        with:
          number: ${{ steps.intent.outputs.pr_number }}
          labels: awaiting response
